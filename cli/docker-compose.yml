version: "3"

services:
  mysql:
    image: mysql
    command: --default-authentication-plugin=mysql_native_password --sync_binlog=0 --innodb_doublewrite=OFF  --innodb-flush-log-at-trx-commit=0 --innodb-flush-method=nosync
    ports:
      - "23306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=testrootpassword
      - MYSQL_DATABASE=xsql_test
      - MYSQL_USER=testuser
      - MYSQL_PASSWORD=testpassword
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/mysql",
          "-hlocalhost",
          "-utestuser",
          "-ptestpassword",
          "-e",
          "SELECT 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: always
    volumes:
      - mysql_data:/var/lib/mysql
  waitmysql:
    image: mysql
    links:
      - mysql
    depends_on:
      - mysql
    entrypoint:
      - bash
      - -c
      - 'until /usr/bin/mysql -hmysql -utestuser -ptestpassword -e "SELECT 1"; do sleep 5; done'

  postgres:
    image: postgres:alpine
    # see https://www.postgresql.org/docs/current/non-durability.html
    command: "-c full_page_writes=off -c fsync=off -c synchronous_commit=off"
    ports:
      - "25432:5432"
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=xsqltest
      - POSTGRES_DB=xsql_test
  waitpostgres:
    image: postgres:alpine
    links:
      - postgres
    depends_on:
      - postgres
    entrypoint:
      - bash
      - -c
      - 'until /usr/local/bin/psql postgres://testuser:xsqltest@postgres/xsql_test -c "SELECT 1"; do sleep 5; done'

volumes:
  mysql_data:
    driver_opts:
      type: tmpfs
      device: tmpfs
